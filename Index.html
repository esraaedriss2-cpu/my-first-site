<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الخريج</title>
    <style>
        /* هنا نضيف لمسات بسيطة وجميلة */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            direction: rtl; /* لجعل النص عربي */
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 50px 70px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.3rem;
            opacity: 0.9;
            line-height: 1.8;
        }

        .emoji-big {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="emoji-big">🎓</span>
        <h1>الخريج</h1>
        <p>مرحباً! أنا <strong>إسراءادريس</strong>.<br>هذا أول موقع لي على الإنترنت.</p>
        <p style="font-size: 1rem;">🚀 أنطلق نحو عالم البرمجة</p>
        <div class="footer">📍 منشور عبر GitHub Pages</div>
    </div>

</body>
</html>
